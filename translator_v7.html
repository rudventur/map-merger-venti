<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RudVentur Creator Map v7 (Flags)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--panel:#0d1117;--border:#1a2332;
  --green:#00ff41;--cyan:#00f0ff;--amber:#ffb800;--red:#ff3333;--purple:#c084fc;
  --text:#c9d1d9;--dim:#484f58;
  --glow-green:0 0 15px rgba(0,255,65,.5);
  --glow-cyan:0 0 15px rgba(0,240,255,.5);
  --map-font-size:28px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Fira Code',monospace;overflow:hidden}

#boot-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .6s}
#boot-screen.fade-out{opacity:0;pointer-events:none}
#boot-text{font-size:clamp(11px,1.8vw,15px);color:var(--green);max-width:600px;padding:2rem;line-height:1.8;white-space:pre}
.cursor-blink::after{content:'█';animation:blink .6s step-end infinite}
@keyframes blink{50%{opacity:0}}

#header{position:fixed;top:0;left:0;right:0;z-index:800;background:linear-gradient(180deg,rgba(10,10,10,.97),rgba(10,10,10,.85));backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#header h1{font-family:'Orbitron',monospace;font-size:clamp(12px,2vw,18px);color:var(--green);text-shadow:var(--glow-green);letter-spacing:2px;white-space:nowrap}
.hdr-btn{background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--dim);padding:4px 10px;border-radius:5px;font-family:'Fira Code',monospace;font-size:10px;cursor:pointer;transition:all .2s;white-space:nowrap}
.hdr-btn:hover{color:var(--text);border-color:var(--dim)}
.hdr-btn.active{color:var(--amber);border-color:var(--amber)}

.size-control{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.size-control label{font-size:10px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px}
input[type=range]{-webkit-appearance:none;height:4px;background:#333;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer}

#translate-bar{position:fixed;top:55px;left:0;right:0;z-index:799;background:rgba(13,17,23,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#base-lang-select{background:var(--bg);color:var(--amber);border:1px solid rgba(255,184,0,.3);padding:5px 8px;border-radius:4px;font-family:'Fira Code',monospace;font-size:12px;cursor:pointer;max-width:150px}
#translate-input{flex:1;min-width:150px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#fff;padding:7px 12px;border-radius:5px;font-family:'Fira Code',monospace;font-size:14px;transition:border-color .2s}
#translate-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 8px rgba(0,255,65,.15)}
.tb-btn{padding:7px 14px;border-radius:5px;font-family:'Fira Code',monospace;font-size:12px;cursor:pointer;transition:all .2s}
#btn-translate{background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.3);color:var(--green)}
#btn-clear{background:rgba(255,51,51,.08);border:1px solid rgba(255,51,51,.25);color:var(--red)}
#translate-status{width:100%;font-size:10px;color:var(--dim);margin-top:2px}

/* MOVE INSTRUCTIONS */
#move-instructions{position:fixed;top:105px;left:50%;transform:translateX(-50%);z-index:900;background:rgba(255,184,0,.12);border:1px solid var(--amber);color:var(--amber);padding:8px 20px;border-radius:8px;font-size:12px;text-align:center;display:none;pointer-events:none;animation:fade-pulse 1.5s ease-in-out infinite}
@keyframes fade-pulse{0%,100%{opacity:.7}50%{opacity:1}}

/* LANG TOGGLES */
#toggle-btn{position:fixed;top:110px;left:10px;z-index:799;background:rgba(13,17,23,.9);border:1px solid var(--border);color:var(--cyan);padding:4px 10px;border-radius:5px;font-family:'Fira Code',monospace;font-size:11px;cursor:pointer}
#lang-toggles{position:fixed;top:105px;left:10px;z-index:798;background:rgba(13,17,23,.92);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:8px;padding:8px;max-height:calc(100vh - 200px);overflow-y:auto;width:260px;display:none}
#lang-toggles.open{display:block}
.lang-check{display:flex;align-items:center;gap:6px;padding:4px 4px;cursor:pointer;font-size:11px;border-radius:3px}
.lang-check:hover{background:rgba(255,255,255,.04)}
.lang-check input[type=checkbox]{accent-color:var(--green);cursor:pointer;flex-shrink:0}
.lang-check .flag-sm{font-size:14px;flex-shrink:0}
.lang-check label{cursor:pointer;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lang-check input[type=range]{width:50px;flex-shrink:0}
.ctrl-row{display:flex;gap:4px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ctrl-row button{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--dim);padding:3px;border-radius:3px;font-family:'Fira Code';font-size:9px;cursor:pointer}
.ctrl-row button:hover{color:var(--text)}

/* MAP */
#map{position:fixed;inset:0;top:100px;z-index:1}
.leaflet-container{background:var(--bg)!important}
/* Move zoom to right */
.leaflet-top.leaflet-left .leaflet-control-zoom{display:none}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--green)!important;border-color:var(--border)!important}

/* MARKERS */
.lang-marker{display:flex;align-items:center;gap:8px;cursor:pointer;white-space:nowrap;transition:all .2s}
.lang-marker.hidden{opacity:0;pointer-events:none}
.lang-marker.selected .lang-flag{animation:flag-blink .5s step-end infinite}
@keyframes flag-blink{50%{opacity:.2}}
.lang-flag{font-size:22px;line-height:1;filter:drop-shadow(0 0 4px rgba(0,0,0,.8));transition:transform .15s;flex-shrink:0}
.lang-marker:hover .lang-flag{transform:scale(1.3)}
.lang-label{font-family:'Orbitron',monospace;font-weight:900;color:var(--text);text-shadow:2px 2px 0px #000,0 0 10px rgba(0,0,0,.9);pointer-events:none;line-height:1;white-space:nowrap}
.lang-marker:hover .lang-label{color:#fff;text-shadow:0 0 15px var(--green)}
.lang-label.translated{color:var(--purple);font-weight:900;text-shadow:2px 2px 0 #000,0 0 15px rgba(192,132,252,.6)}

/* SIDE PANEL */
#side-panel{position:fixed;top:100px;right:0;bottom:0;width:480px;max-width:92vw;z-index:900;background:var(--panel);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .35s;overflow-y:auto;display:flex;flex-direction:column}
#side-panel.open{transform:translateX(0)}
#panel-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;z-index:10}
#panel-content{padding:1.5rem;flex:1}
.panel-lang-name{font-family:'Orbitron',monospace;font-size:clamp(28px,5vw,42px);margin-bottom:4px}
.panel-country{font-size:14px;color:var(--dim);margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:1px}
.panel-section{margin-bottom:1.5rem}
.panel-section-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:.6rem;border-bottom:1px solid var(--border);padding-bottom:4px}
.phrase-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:12px 15px;margin-bottom:8px}
.phrase-en{font-size:12px;color:var(--dim);text-transform:uppercase}
.phrase-tl{font-size:20px;color:#fff;margin:4px 0;font-family:'Orbitron'}
.hello-big{font-size:clamp(40px,6vw,56px);font-weight:900;margin:6px 0;line-height:1.1}
.alphabet-display{background:rgba(0,0,0,.3);border:1px solid var(--border);padding:15px;border-radius:8px;font-size:16px;line-height:1.8;color:var(--cyan);word-break:break-all;margin-top:10px;max-height:200px;overflow-y:auto}
.dialect-badge{display:inline-block;background:var(--cyan);color:#000;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:bold;margin-left:8px;vertical-align:middle}
.panel-size-control{display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--border)}
.panel-size-control label{font-size:10px;color:var(--cyan)}
.panel-size-control input[type=range]{flex:1}
.panel-size-control .sz-val{font-size:11px;color:var(--amber);min-width:30px;text-align:right}

/* GRAMMAR MODAL */
#grammar-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.8);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:1rem}
#grammar-modal{background:var(--panel);border:1px solid var(--green);border-radius:12px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 0 50px rgba(0,255,65,.15)}
#grammar-body{padding:1.5rem}

/* FOOTER */
#footer{position:fixed;bottom:0;left:0;right:0;z-index:800;background:linear-gradient(0deg,rgba(10,10,10,.95),rgba(10,10,10,.6));border-top:1px solid var(--border);padding:5px 1rem;font-size:10px;color:var(--dim);display:flex;justify-content:space-between}

/* RIGHT SIDE CONTROLS (zoom + clear) */
#right-controls{position:fixed;top:110px;right:12px;z-index:799;display:flex;flex-direction:column;gap:4px}
#right-controls button{width:34px;height:34px;background:var(--panel);border:1px solid var(--border);color:var(--green);font-size:18px;cursor:pointer;border-radius:4px;font-family:'Fira Code';display:flex;align-items:center;justify-content:center;transition:all .15s}
#right-controls button:hover{background:rgba(0,255,65,.1);border-color:var(--green)}

@media(max-width:600px){
  #side-panel{top:auto;bottom:0;height:65vh;transform:translateY(100%);border-radius:16px 16px 0 0}
  #side-panel.open{transform:translateY(0)}
  .lang-label{font-size:18px!important}
  #header h1{font-size:14px}
  #lang-toggles{width:220px}
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="boot-screen"><div id="boot-text"></div></div>

<div id="header">
  <h1>🗺️ CREATOR MAP v7</h1>
  <div class="size-control">
    <label>ALL SIZE</label>
    <input type="range" id="sizeSlider" min="12" max="48" value="28" style="width:80px" oninput="updateGlobalSize(this.value)">
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <button class="hdr-btn" id="btn-move" onclick="toggleMoveMode()">📌 MOVE</button>
    <button class="hdr-btn" onclick="resetAllState()">↺ RESET ALL</button>
    <span style="font-size:10px;color:var(--dim)">RUDVENTUR © 2026</span>
  </div>
</div>

<div id="translate-bar">
  <select id="base-lang-select"></select>
  <input id="translate-input" type="text" placeholder="Type to translate..." autocomplete="off">
  <button class="tb-btn" id="btn-translate">TRANSLATE ⚡</button>
  <button class="tb-btn" id="btn-clear">CLEAR ✕</button>
  <div id="translate-status"></div>
</div>

<div id="move-instructions">🏁 Click a flag to select it, then click anywhere on the map to move it</div>

<button id="toggle-btn" onclick="toggleLangPanel()">☑ LANGUAGES</button>
<div id="lang-toggles">
  <div class="ctrl-row">
    <button onclick="selectAllLangs(true)">All</button>
    <button onclick="selectAllLangs(false)">None</button>
    <button onclick="selectByTier('major')">Major</button>
    <button onclick="selectByTier('regional')">Regional</button>
  </div>
  <div id="lang-checks-list"></div>
</div>

<div id="map"></div>

<!-- RIGHT SIDE: Zoom + Clear -->
<div id="right-controls">
  <button onclick="map.zoomIn()" title="Zoom in">+</button>
  <button onclick="map.zoomOut()" title="Zoom out">−</button>
</div>

<div id="side-panel">
  <button id="panel-close" style="position:absolute;top:10px;right:14px;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;z-index:10">✕</button>
  <div id="panel-content"></div>
</div>

<div id="grammar-overlay">
  <div id="grammar-modal">
    <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div id="grammar-modal-title" style="font-family:'Orbitron';color:var(--green)"></div>
      <button onclick="closeGrammar()" style="background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer">✕</button>
    </div>
    <div id="grammar-body"></div>
  </div>
</div>

<div id="footer">
  <span>> RudVentur © 2026 | <a href="https://rudventur.com" target="_blank" style="color:var(--green);text-decoration:none">rudventur.com</a></span>
  <span class="cursor-blink"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ========================================================================
//  STATE
// ========================================================================
let map, markers = [];
let checkedLangs = new Set();
let currentTranslations = {};
let translatingActive = false;
let baseLang = 'en';
let moveMode = false;
let selectedMarker = null;
let langSizes = {}; // { code: px }

// ========================================================================
//  PERSISTENCE
// ========================================================================
const STORE_KEY = 'rudventur-map-v7';
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem(STORE_KEY)||'{}');
    return s;
  }catch(e){return{}}
}
function saveState(){
  const positions = {};
  markers.forEach(m=>{
    const ll=m.getLatLng(), o=m._langData;
    if(Math.abs(ll.lat-o.lat)>0.01||Math.abs(ll.lng-o.lng)>0.01) positions[o.code]={lat:ll.lat,lng:ll.lng};
  });
  const checked = [...checkedLangs];
  localStorage.setItem(STORE_KEY, JSON.stringify({positions, sizes:langSizes, checked}));
}
function resetAllState(){
  if(!confirm('Reset ALL positions, sizes, and selections to default?')) return;
  localStorage.removeItem(STORE_KEY);
  location.reload();
}

// ========================================================================
//  BOOT
// ========================================================================
const bootLines=["> RUDVENTUR OS v17.0 — FLAGS","> Flag markers: Active","> Click-to-move: Enabled","> Per-language sizing: Ready","> Full state persistence: ON","> ","Ready to explore. 🗺️"];
(function(){
  const el=document.getElementById('boot-text');let li=0,ci=0,txt='';
  function tick(){
    if(li>=bootLines.length){el.classList.add('cursor-blink');setTimeout(()=>{document.getElementById('boot-screen').classList.add('fade-out');setTimeout(initApp,600)},400);return}
    const line=bootLines[li];
    if(ci<line.length){txt+=line[ci];ci++;el.textContent=txt;setTimeout(tick,10)}
    else{txt+='\n';li++;ci=0;el.textContent=txt;setTimeout(tick,50)}
  }
  tick();
})();

// ========================================================================
//  INIT
// ========================================================================
function initApp(){
  const saved = loadState();
  if(saved.sizes) langSizes = saved.sizes;
  if(saved.checked){
    checkedLangs = new Set(saved.checked);
  } else {
    LANGUAGES.filter(l=>l.tier==='major').forEach(l=>checkedLangs.add(l.code));
  }
  initMap(saved.positions||{});
  initBaseLangSelect();
  initLangCheckboxes();
  initTranslateBar();
}

// ========================================================================
//  MAP
// ========================================================================
function initMap(savedPositions){
  map = L.map('map',{center:[50,15],zoom:4,zoomControl:false,attributionControl:false,minZoom:2,maxZoom:10});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

  LANGUAGES.forEach(lang=>{
    const flag = FLAGS[lang.code]||'🏳️';
    const sz = langSizes[lang.code] || 28;
    const icon = L.divIcon({
      className:'',
      html:`<div class="lang-marker" data-code="${lang.code}" id="marker-${lang.code}">
        <span class="lang-flag">${flag}</span>
        <span class="lang-label" id="label-${lang.code}" style="font-size:${sz}px">${lang.name}</span>
      </div>`,
      iconSize:[null,null],iconAnchor:[11,11],
    });
    const pos = savedPositions[lang.code]||{lat:lang.lat,lng:lang.lng};
    const m = L.marker([pos.lat,pos.lng],{icon}).addTo(map);
    m._langData = lang;
    m.on('click', ()=> onMarkerClick(m));
    markers.push(m);
  });

  // Click on map to move selected marker
  map.on('click', e=>{
    if(moveMode && selectedMarker){
      selectedMarker.setLatLng(e.latlng);
      deselectMarker();
      saveState();
      setTimeout(resolveCollisions,100);
    }
  });

  updateVisibility();
  setTimeout(resolveCollisions,500);
  map.on('zoomend moveend',()=>{updateVisibility();resolveCollisions()});
}

function onMarkerClick(m){
  if(moveMode){
    if(selectedMarker === m){
      deselectMarker();
    } else {
      deselectMarker();
      selectedMarker = m;
      const el = document.getElementById('marker-'+m._langData.code);
      if(el) el.classList.add('selected');
    }
  } else {
    openPanel(m._langData);
  }
}

function deselectMarker(){
  if(selectedMarker){
    const el = document.getElementById('marker-'+selectedMarker._langData.code);
    if(el) el.classList.remove('selected');
    selectedMarker = null;
  }
}

function toggleMoveMode(){
  moveMode = !moveMode;
  const btn = document.getElementById('btn-move');
  const instr = document.getElementById('move-instructions');
  btn.classList.toggle('active', moveMode);
  btn.textContent = moveMode ? '📌 MOVING...' : '📌 MOVE';
  instr.style.display = moveMode ? 'block' : 'none';
  if(!moveMode) deselectMarker();
}

function resolveCollisions(){
  const fontSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--map-font-size'))||28;
  const padding = Math.max(25, fontSize*2);
  markers.forEach(m=>{const el=m.getElement();if(el)el.classList.remove('hidden')});
  const vis = markers.filter(m=>{const el=m.getElement();return el&&el.style.display!=='none'&&!el.classList.contains('hidden')});
  for(let i=0;i<vis.length;i++){
    for(let j=i+1;j<vis.length;j++){
      const p1=map.latLngToContainerPoint(vis[i].getLatLng()),p2=map.latLngToContainerPoint(vis[j].getLatLng());
      const dist=Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2);
      if(dist<padding){
        const t1=vis[i]._langData.tier==='major'?3:(vis[i]._langData.tier==='regional'?2:1);
        const t2=vis[j]._langData.tier==='major'?3:(vis[j]._langData.tier==='regional'?2:1);
        if(t1>t2)vis[i].getElement().classList.add('hidden');else vis[j].getElement().classList.add('hidden');
      }
    }
  }
}

function updateVisibility(){
  const z=map.getZoom();
  markers.forEach(m=>{const el=m.getElement();if(!el)return;el.style.display=z>=m._langData.minZoom?'':'none'});
}

function updateGlobalSize(val){
  document.documentElement.style.setProperty('--map-font-size',val+'px');
  // Update all labels that don't have custom size
  LANGUAGES.forEach(l=>{
    if(!langSizes[l.code]){
      const lbl=document.getElementById('label-'+l.code);
      if(lbl)lbl.style.fontSize=val+'px';
    }
  });
  setTimeout(resolveCollisions,100);
}

function setLangSize(code, val){
  langSizes[code]=parseInt(val);
  const lbl=document.getElementById('label-'+code);
  if(lbl) lbl.style.fontSize=val+'px';
  // Update slider in side panel if open
  const ps=document.getElementById('panel-slider');
  if(ps&&ps.dataset.code===code) ps.value=val;
  // Update slider in checkbox panel
  const cs=document.getElementById('sz-'+code);
  if(cs) cs.value=val;
  // Update map slider display
  const sv=document.getElementById('szv-'+code);
  if(sv) sv.textContent=val+'px';
  const psv=document.getElementById('panel-sz-val');
  if(psv&&ps&&ps.dataset.code===code) psv.textContent=val+'px';
  saveState();
  setTimeout(resolveCollisions,100);
}

// ========================================================================
//  CONTROLS
// ========================================================================
function initBaseLangSelect(){
  const sel=document.getElementById('base-lang-select');
  LANGUAGES.filter(l=>!l.dialectOf).sort((a,b)=>a.name.localeCompare(b.name)).forEach(l=>{
    const opt=document.createElement('option');opt.value=l.code;opt.textContent=`${FLAGS[l.code]||''} ${l.name}`;
    if(l.code==='en')opt.selected=true;sel.appendChild(opt);
  });
  sel.addEventListener('change',e=>{baseLang=e.target.value});
}

function initLangCheckboxes(){
  const list=document.getElementById('lang-checks-list');
  LANGUAGES.forEach(lang=>{
    const flag=FLAGS[lang.code]||'🏳️';
    const sz=langSizes[lang.code]||28;
    const div=document.createElement('div');div.className='lang-check';
    div.innerHTML=`
      <input type="checkbox" id="chk-${lang.code}" value="${lang.code}" ${checkedLangs.has(lang.code)?'checked':''}>
      <span class="flag-sm">${flag}</span>
      <label for="chk-${lang.code}" style="flex:1">${lang.name}</label>
      <input type="range" id="sz-${lang.code}" min="10" max="60" value="${sz}" style="width:50px" oninput="setLangSize('${lang.code}',this.value)">
      <span id="szv-${lang.code}" style="font-size:9px;color:var(--amber);min-width:28px">${sz}px</span>`;
    div.querySelector('input[type=checkbox]').addEventListener('change',e=>{
      if(e.target.checked)checkedLangs.add(lang.code);else checkedLangs.delete(lang.code);
      updateVisibility();resolveCollisions();saveState();
    });
    list.appendChild(div);
  });
}

function selectAllLangs(checked){
  checkedLangs.clear();
  document.querySelectorAll('#lang-checks-list input[type=checkbox]').forEach(cb=>{cb.checked=checked;if(checked)checkedLangs.add(cb.value)});
  updateVisibility();resolveCollisions();saveState();
}
function selectByTier(tier){
  checkedLangs.clear();
  document.querySelectorAll('#lang-checks-list input[type=checkbox]').forEach(cb=>{cb.checked=false});
  LANGUAGES.forEach(l=>{if(l.tier===tier){checkedLangs.add(l.code);const cb=document.getElementById('chk-'+l.code);if(cb)cb.checked=true}});
  updateVisibility();resolveCollisions();saveState();
}
function toggleLangPanel(){document.getElementById('lang-toggles').classList.toggle('open');document.getElementById('toggle-btn').classList.toggle('shifted')}

// ========================================================================
//  TRANSLATE
// ========================================================================
function initTranslateBar(){
  document.getElementById('btn-translate').addEventListener('click',doTranslate);
  document.getElementById('translate-input').addEventListener('keydown',e=>{if(e.key==='Enter')doTranslate()});
  document.getElementById('btn-clear').addEventListener('click',()=>{
    currentTranslations={};translatingActive=false;document.getElementById('translate-input').value='';
    const s=document.getElementById('translate-status');if(s)s.textContent='';updateMapLabels();
  });
}

async function doTranslate(){
  const input=document.getElementById('translate-input'),status=document.getElementById('translate-status'),btn=document.getElementById('btn-translate');
  if(!status)return;
  const text=input.value.trim();if(!text)return;
  const targets=LANGUAGES.filter(l=>checkedLangs.has(l.code)&&l.code!==baseLang);
  btn.disabled=true;btn.textContent='TRANSLATING...';status.textContent=`> Translating "${text}"...`;
  currentTranslations={};translatingActive=true;
  let done=0;
  for(let i=0;i<targets.length;i+=3){
    const batch=targets.slice(i,i+3);
    await Promise.all(batch.map(async lang=>{
      try{
        const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${baseLang}|${lang.code}`;
        const res=await fetch(url);const data=await res.json();
        if(data.responseStatus===200)currentTranslations[lang.code]=data.responseData.translatedText;
      }catch(e){console.warn('Fail',lang.name)}
      done++;status.textContent=`> ${done}/${targets.length} complete`;updateMapLabels();
    }));
  }
  btn.disabled=false;btn.textContent='TRANSLATE ⚡';status.textContent='> Done.';updateMapLabels();
}

function updateMapLabels(){
  LANGUAGES.forEach(lang=>{
    const lbl=document.getElementById('label-'+lang.code);if(!lbl)return;
    if(translatingActive&&currentTranslations[lang.code]){lbl.textContent=currentTranslations[lang.code];lbl.classList.add('translated')}
    else{lbl.textContent=lang.name;lbl.classList.remove('translated')}
  });
  setTimeout(resolveCollisions,200);
}

function openPanel(lang){
  const panel=document.getElementById('side-panel'),content=document.getElementById('panel-content');

  const translatedBit=currentTranslations[lang.code]?`<div class="panel-section"><div class="panel-section-title">Translation</div><div style="font-size:24px;color:var(--purple);font-weight:bold">${currentTranslations[lang.code]}</div></div>`:'';
  const sz=langSizes[lang.code]||28;

  content.innerHTML=`
    <div style="font-size:60px;margin-bottom:8px">${flag}</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="panel-lang-name" style="color:${lang.tier==='major'?'var(--green)':(lang.tier==='regional'?'var(--cyan)':'var(--amber)')}">${lang.hello.text}</div>
      ${dialectBadge}
    </div>
    <h2 class="panel-lang-name" style="color:#fff;font-size:22px">${lang.name}</h2>
    <div class="panel-country">${lang.country} · ${lang.speakers}</div>
    <div class="panel-size-control">
      <label>SIZE</label>
      <input type="range" id="panel-slider" data-code="${lang.code}" min="10" max="60" value="${sz}" oninput="setLangSize('${lang.code}',this.value)" style="flex:1">
      <span class="sz-val" id="panel-sz-val">${sz}px</span>
    </div>
    ${translatedBit}
    <div class="panel-section"><div class="panel-section-title">Alphabet</div><div class="alphabet-display">${lang.alphabet||''}</div></div>
    <div class="panel-section"><div class="panel-section-title">Family</div><div style="font-size:14px">${lang.family}</div></div>
    ${lang.grammar?`<div class="panel-section"><div class="panel-section-title">Quick Grammar</div><div style="font-size:13px;color:var(--dim)">${lang.grammar}</div></div>`:''}
    <button onclick="openGrammar('${lang.name}')" style="width:100%;margin-top:20px;padding:12px;background:var(--green);color:#000;border:none;font-family:'Orbitron';cursor:pointer;border-radius:6px;font-weight:bold">FULL INFO</button>`;
  panel.classList.add('open');
}
document.getElementById('panel-close').addEventListener('click',()=>document.getElementById('side-panel').classList.remove('open'));

// ========================================================================
//  GRAMMAR MODAL
// ========================================================================
function openGrammar(name){
  const lang=LANGUAGES.find(l=>l.name===name);if(!lang)return;
  document.getElementById('grammar-modal-title').textContent=`${FLAGS[lang.code]||''} ${lang.name} Details`;
  document.getElementById('grammar-body').innerHTML=`
    <div style="padding:1rem"><h3 style="color:var(--cyan)">Full Alphabet</h3><div class="alphabet-display">${lang.alphabet||''}</div></div>
    <div style="padding:0 1rem 1rem"><h3 style="color:var(--cyan)">Family</h3><p style="margin-top:8px">${lang.family}</p></div>
    ${lang.grammar?`<div style="padding:0 1rem 1rem"><h3 style="color:var(--cyan)">Grammar</h3><p style="margin-top:8px">${lang.grammar}</p></div>`:''}`;
  document.getElementById('grammar-overlay').style.display='flex';
}
function closeGrammar(){document.getElementById('grammar-overlay').style.display='none'}

// ESC key
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeGrammar();document.getElementById('side-panel').classList.remove('open');if(moveMode)deselectMarker()}
});
</script>
</body>
</html>
